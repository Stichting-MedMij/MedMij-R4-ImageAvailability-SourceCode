name: Gezondheidsmeter Java CI with JaCoCo

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven (in Gezondheidsmeter/java)
        working-directory: Gezondheidsmeter/java
        run: mvn -B test

      - name: Upload JaCoCo Report to Codecov
        working-directory: Gezondheidsmeter/java
        run: |
          curl -Os https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov -t ${{ secrets.CODECOV_TOKEN }} -f target/site/jacoco/jacoco.xml